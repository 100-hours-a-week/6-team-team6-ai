name: Deploy AI (Dev v2)

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-ai-dev-v2
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: billage-ai
  ASG_NAME: billage-dev-v2-ai-asg

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::988319239270:role/billage-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                        -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Trigger ASG Instance Refresh
        run: |
          # 기존 refresh가 남아 있으면 취소 후 새 refresh 시작
          IN_PROGRESS_REFRESH_ID=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name $ASG_NAME \
            --region $AWS_REGION \
            --query "InstanceRefreshes[?Status=='InProgress']|[0].InstanceRefreshId" \
            --output text)

          if [ -n "$IN_PROGRESS_REFRESH_ID" ] && [ "$IN_PROGRESS_REFRESH_ID" != "None" ]; then
            echo "Instance refresh in progress: $IN_PROGRESS_REFRESH_ID"
            echo "Cancel existing refresh before starting a new one."
            aws autoscaling cancel-instance-refresh \
              --auto-scaling-group-name $ASG_NAME \
              --region $AWS_REGION

            for i in {1..30}; do
              STATUS=$(aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name $ASG_NAME \
                --region $AWS_REGION \
                --query "InstanceRefreshes[?InstanceRefreshId=='$IN_PROGRESS_REFRESH_ID']|[0].Status" \
                --output text)
              echo "Cancel wait ($i/30): status=$STATUS"
              if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Successful" ] || [ "$STATUS" = "None" ]; then
                break
              fi
              sleep 10
            done
          fi

          NEW_REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --region $AWS_REGION \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage": 0, "InstanceWarmup": 300}' \
            --query "InstanceRefreshId" \
            --output text)

          echo "Started instance refresh: $NEW_REFRESH_ID"

      - name: Notify Discord on Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "embeds": [{
                "title": "AI Dev v2 배포 실패",
                "color": 15158332,
                "fields": [
                  {"name": "Branch", "value": "develop", "inline": true},
                  {"name": "Commit", "value": "`${{ github.sha }}`", "inline": true}
                ],
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK }}
